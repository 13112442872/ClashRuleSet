[custom]
; kclash_meta_full.ini
; 用途：subconverter 外部配置模板，规则源尽量改用 MetaCubeX/meta-rules-dat 的 Clash YAML rule-set
; 适用：OpenClash / Clash Meta / Mihomo 订阅转换
; 注意：这是给 subconverter 用的 .ini，不是 Mihomo 原生 config.yaml

; =====================
; 规则集：优先顺序很重要
; =====================

; 局域网 / 私有地址直连
ruleset= 全球直连,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml,86400
ruleset= 全球直连,clash-ipcidr:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml,86400

; 广告 / 跟踪器
ruleset= 广告拦截,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.yaml,86400
ruleset= 应用净化,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tracker.yaml,86400

; AI：OpenAI / Claude / Gemini / GitHub Copilot 相关
ruleset= 美区AI,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.yaml,86400
ruleset= 美区AI,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/anthropic.yaml,86400
ruleset= 美区AI,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.yaml,86400
ruleset= 美区AI,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml,86400

; 开发者服务
ruleset= Developer,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml,86400
ruleset= Developer,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/gitlab.yaml,86400
ruleset= Developer,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/docker.yaml,86400

; 微软 / 苹果：先匹配 CN 子集直连，再匹配完整服务
ruleset= 全球直连,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft%40cn.yaml,86400
ruleset= 全球直连,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple-cn.yaml,86400
ruleset= 微软服务,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.yaml,86400
ruleset= 微软服务,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/onedrive.yaml,86400
ruleset= 苹果服务,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.yaml,86400

; Telegram：域名 + IP
ruleset= Telegram,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.yaml,86400
ruleset= Telegram,clash-ipcidr:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.yaml,86400

