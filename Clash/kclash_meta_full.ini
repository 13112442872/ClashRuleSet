[custom]
; kclash_meta_full_icon.ini
; 用途：subconverter 外部配置模板，规则源尽量使用 MetaCubeX/meta-rules-dat 的 Clash YAML rule-set
; 适用：OpenClash / Clash Meta / Mihomo 订阅转换
; 说明：ruleset 行已去掉末尾 interval；规则集更新间隔可由客户端或转换器默认值处理
; 注意：这是给 subconverter 用的 .ini，不是 Mihomo 原生 config.yaml

; =====================
; 规则集：优先顺序很重要
; =====================

; 局域网 / 私有地址直连
ruleset= 🌐 全球直连,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
ruleset= 🌐 全球直连,clash-ipcidr:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml

; 广告 / 跟踪 / 拦截
ruleset= 🛑 广告拦截,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.yaml
ruleset= 🍃 应用净化,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat/meta/geo/geosite/tracker.yaml

; AI：先放独立重点规则，再放 category-ai-!cn 兜底国外 AI
