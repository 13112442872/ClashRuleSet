[custom]
; kclash_meta_full_fixed.ini
; 用途：subconverter 外部配置模板
; 规则源：MetaCubeX/meta-rules-dat meta 分支
; 说明：86400 是 ruleset 更新间隔，单位秒，等于 24 小时。为兼容 OpenClash/subconverter 后端，建议保留。

