; 局域网 / 私有地址
ruleset= 全球直连,clash-domain:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml,86400
ruleset= 全球直连,clash-ipcidr:https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml,86400

; 广告 / 跟踪
